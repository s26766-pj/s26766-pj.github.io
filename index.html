<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egzamin NAI - Symulacja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .timer-section {
            background: #f8f9fa;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
        }

        .timer {
            font-size: 1.5em;
            font-weight: bold;
            color: #dc3545;
        }

        .question-counter {
            font-size: 1.1em;
            color: #666;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .exam-content {
            padding: 30px;
        }

        .question {
            display: none;
        }

        .question.active {
            display: block;
        }

        .question-number {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #333;
        }

        .question-image {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
            display: flex;
            align-items: center;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f0ff;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #667eea;
            background: #e8eaff;
            font-weight: 600;
        }

        .option-label {
            font-weight: 600;
            color: #667eea;
            margin-right: 12px;
            min-width: 30px;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #218838;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-screen {
            display: none;
            padding: 40px;
            text-align: center;
        }

        .results-screen.active {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .score-circle span {
            font-size: 2.5em;
            font-weight: bold;
            color: white;
        }

        .score-text {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 30px;
        }

        .warning {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #856404;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }

            .timer-section {
                flex-direction: column;
                gap: 10px;
            }

            .navigation {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Egzamin NAI</h1>
            <p>Symulacja egzaminu - 30 minut, 56 pytań</p>
        </div>

        <div class="timer-section">
            <div class="question-counter">
                Pytanie <span id="current-q">1</span> z <span id="total-q">56</span>
            </div>
            <div class="timer" id="timer">30:00</div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="exam-content" id="exam-content">
            <!-- Questions will be inserted here -->
        </div>

        <div class="results-screen" id="results-screen">
            <div class="score-circle">
                <span id="score-percentage">0%</span>
            </div>
            <div class="score-text">
                Uzyskałeś <span id="score-correct">0</span> z <span id="score-total">56</span> punktów!
            </div>
            <button class="btn btn-primary" onclick="location.reload()">Rozpocznij ponownie</button>
        </div>
    </div>

    <script>
        // Questions data with shuffled answers
        const questionsData = [
            {q: "Kto jest twórcą terminu 'sztuczna inteligencja'?", correct: "John McCarthy", wrong: ["Alan Turing", "Marvin Minsky", "Herbert Simon"]},
            {q: "Test Turinga zaproponowany przez Alana Turinga w 1950 roku to test zdolności do:", correct: "zachowania nieodróżnialnym od zachowania człowieka", wrong: ["rozwiązywania problemów logicznych szybciej niż człowiek", "uczenia się na podstawie danych historycznych", "rozumienia języka naturalnego"]},
            {q: "Uczenie maszynowe to nauka o algorytmach, które:", correct: "automatycznie ulepszają się poprzez doświadczenie", wrong: ["są zaprogramowane wyłącznie regułami logicznymi", "zawsze wymagają nadzoru człowieka", "działają tylko na danych symbolicznych"]},
            {q: "Algorytm, któremu dostarcza się wystarczająco dużą liczbę przykładowych danych wejściowych, a następnie zestaw odpowiednich danych wyjściowych lub zdarzeń/klas:", correct: "uczenie nadzorowane", wrong: ["uczenie nienadzorowane", "uczenie przez wzmacnianie", "uczenie statystyczne"]},
            {q: "Przewidywany wynik jest liczbą ciągłą w odniesieniu do danych wejściowych i nazywa się:", correct: "regresją", wrong: ["klasyfikacją", "klasteryzacją", "predykcją binarną"]},
            {q: "Algorytm rozpoczynający się od węzła początkowego grafu ma na celu znalezienie ścieżki do węzła docelowego przy najmniejszym koszcie:", correct: "A*", wrong: ["BFS", "DFS", "algorytm Dijkstry"]},
            {q: "Który algorytm jest opisany wzorem MIN-MAX, ALPHA-BETA, -1+1:", correct: "Teoria gier o sumie zerowej", wrong: ["Algorytm genetyczny", "Algorytm Monte Carlo", "Programowanie dynamiczne"]},
            {q: "Do czego głównie służy logika rozmyta?", correct: "Zarządzanie niepewnością i analizowanie nieprecyzyjnych informacji", wrong: ["Przetwarzania danych binarnych", "Optymalizacji liniowej", "Analizy statystycznej dużych zbiorów danych"]},
            {q: "Jaki jest poręczny operator dla funkcji przynależności x i y?", correct: "MAX (x, y)", wrong: ["MIN (x, y)", "x + y", "x * y"]},
            {q: "Jak nazywa się punkt zaznaczony na zielono?", correct: "środek ciężkości", wrong: ["punkt maksymalnej przynależności", "punkt równowagi", "punkt decyzyjny"], image: "fuzzy.png"},
            {q: "Do czego w logice rozmytej odnosi się termin 'funkcja członkowska' (ang. membership function)?", correct: "Krzywa, która definiuje, jak punkt w specyfikacji wejściowej jest odwzorowywany na wartość przynależności", wrong: ["Reguła decyzyjna systemu", "Zbiór danych wejściowych", "Funkcja aktywacji"]},
            {q: "Która z poniższych metod NIE jest powszechną metodą konstruowania funkcji przynależności w logice rozmytej?", correct: "Wielomianowa", wrong: ["Trójkątna", "Trapezowa", "Gaussowska"]},
            {q: "Jaka jest rola 'bazy reguł' (ang. rule base) w systemach wnioskowania rozmytego?", correct: "Definiowanie relacji między zmiennymi wejściowymi i wyjściowymi za pomocą instrukcji if-then", wrong: ["Przechowywanie danych treningowych", "Obliczanie funkcji przynależności", "Definiowanie przestrzeni rozmytej"]},
            {q: "Jaki jest główny cel algorytmów klasteryzacji w sztucznej inteligencji?", correct: "Grupowanie podobnych punktów danych", wrong: ["Przewidywanie wartości ciągłych", "Klasyfikowanie danych etykietowanych", "Redukcja wymiarowości"]},
            {q: "W jaki sposób w klasteryzacji metodą k-średnich zazwyczaj określa się początkowe położenie centroidów?", correct: "Losowo", wrong: ["Na podstawie średniej wszystkich punktów", "Według etykiet klas", "Poprzez PCA"]},
            {q: "Jaka jest rola parametru 'K' w algorytmie k-średnich?", correct: "Reprezentuje on liczbę klastrów, które mają zostać utworzone", wrong: ["Określa liczbę iteracji", "Definiuje próg zbieżności", "Oznacza liczbę cech"]},
            {q: "W jaki sposób podczas iteracyjnego procesu k-średnich punkty danych są przypisywane do klastrów?", correct: "Na podstawie ich odległości od najbliższego centroidu", wrong: ["Losowo w każdej iteracji", "Na podstawie gęstości danych", "Według kolejności występowania"]},
            {q: "Jakie jest główne wyzwanie dla algorytmu K-Means pod względem wrażliwości na początkowe centroidy?", correct: "Może zbiegać do minimów lokalnych", wrong: ["Wysoka złożoność obliczeniowa", "Brak skalowalności", "Konieczność etykietowania danych"]},
            {q: "Jaka jest rola algorytmu w fazie uczenia w uczeniu nadzorowanym?", correct: "Uczenie z danych oznaczonych", wrong: ["Grupowanie danych bez etykiet", "Eksploracja przestrzeni stanów", "Losowe generowanie wyników"]},
            {q: "Zalecany algorytm dla problemów, w których pożądany wynik nie jest jawnie podany w danych treningowych?", correct: "Uczenie bez nadzoru", wrong: ["Uczenie nadzorowane", "Uczenie regresyjne", "Klasyfikacja binarna"]},
            {q: "Jaki typ algorytmu jest często używany do podejmowania decyzji sekwencyjnych w aplikacjach takich jak gry i robotyka?", correct: "Uczenie ze wzmocnieniem", wrong: ["Uczenie nienadzorowane", "Regresja liniowa", "Drzewa decyzyjne"]},
            {q: "Czym jest Scikit-learn?", correct: "Biblioteka uczenia maszynowego", wrong: ["Językiem programowania", "Silnikiem baz danych", "Frameworkiem deep learning"]},
            {q: "Jak można podzielić zbiór danych na zbiór treningowy i testowy za pomocą Scikit-learn?", correct: "train_test_split()", wrong: ["split_data()", "dataset.divide()", "sklearn.split()"]},
            {q: "Który moduł Scikit-learn jest powszechnie używany do skalowania cech?", correct: "sklearn.preprocessing", wrong: ["sklearn.metrics", "sklearn.cluster", "sklearn.model_selection"]},
            {q: "Jaki jest cel metody fit() w Scikit-learn?", correct: "Trenuje ona model uczenia maszynowego", wrong: ["Testuje model", "Wizualizuje dane", "Normalizuje zbiór danych"]},
            {q: "Który moduł Scikit-learn udostępnia narzędzia do budowania i oceny modeli uczenia maszynowego?", correct: "sklearn.metrics", wrong: ["sklearn.preprocessing", "sklearn.datasets", "sklearn.pipeline"]},
            {q: "Czym jest drzewo decyzyjne w uczeniu maszynowym?", correct: "Model, który przewiduje wyniki na podstawie serii decyzji", wrong: ["Modelem probabilistycznym", "Algorytmem klasteryzacji", "Siecią neuronową"]},
            {q: "Czym jest przycinanie w kontekście drzew decyzyjnych?", correct: "Przycinanie zbędnych gałęzi w celu uniknięcia nadmiernego dopasowania", wrong: ["Usuwaniem danych treningowych", "Zwiększaniem głębokości drzewa", "Losowym skracaniem ścieżek"]},
            {q: "Jaki jest główny cel maszyny wektorów wspierających (SVM) w uczeniu maszynowym?", correct: "Klasyfikowanie danych do dwóch lub więcej kategorii", wrong: ["Grupowanie danych", "Redukcja wymiarów", "Generowanie cech"]},
            {q: "Jaka jest rola hiperpłaszczyzny w maszynie wektorów wspierających (SVM)?", correct: "To granica decyzyjna oddziela klasy", wrong: ["Minimalizacja błędu", "Skalowanie danych", "Transformacja cech"]},
            {q: "Które jądro maszyny wektorów wspierających (SVM) jest często używane w przypadku danych nieliniowo separowalnych?", correct: "Jądro radialnych funkcji bazowych (RBF)", wrong: ["Jądro liniowe", "Jądro wielomianowe stopnia 1", "Jądro sigmoidalne"]},
            {q: "Czym jest sieć neuronowa?", correct: "System połączonych węzłów przetwarzających informacje", wrong: ["Zbiorem reguł logicznych", "Algorytmem sortowania", "Modelem statystycznym bez wag"]},
            {q: "Jaki jest podstawowy element konstrukcyjny sieci neuronowej?", correct: "Neuron", wrong: ["Warstwa", "Waga", "Funkcja kosztu"]},
            {q: "Czym jest perceptron w kontekście sieci neuronowych?", correct: "Najprostsza forma sieci neuronowej z jedną warstwą", wrong: ["Wielowarstwową siecią neuronową", "Funkcją aktywacji", "Algorytmem uczenia bez nadzoru"]},
            {q: "Jaki jest cel warstwy wejściowej w sieci neuronowej?", correct: "Odbieranie danych wejściowych", wrong: ["Obliczanie błędu", "Aktualizacja wag", "Klasyfikacja wyników"]},
            {q: "Jaka jest rola wag w sieci neuronowej?", correct: "Dostosowywanie ważności cech wejściowych", wrong: ["Przechowywanie danych", "Normalizacja wejść", "Losowanie wyników"]},
            {q: "Jaka jest cecha charakterystyczna funkcji aktywacji sigmoidalnej?", correct: "Zwraca wartości z zakresu [0, 1]", wrong: ["Zwraca wartości ujemne", "Jest funkcją liniową", "Zwraca tylko 0 lub 1"]},
            {q: "Proces aktualizacji wag w celu zminimalizowania różnicy między przewidywanym a rzeczywistym wynikiem nazywa się:", correct: "Propagacją wsteczną", wrong: ["Normalizacją", "Klasteryzacją", "Regularyzacją"]},
            {q: "Jaką rolę pełni Bias w sieci neuronowej?", correct: "Wprowadzenie losowości do modelu", wrong: ["Zwiększanie liczby neuronów", "Skalowanie danych wejściowych", "Losowe resetowanie wag"]},
            {q: "Jak zazwyczaj oblicza się dokładność jako metrykę w zadaniach klasyfikacji sieci neuronowych?", correct: "(Prawdziwie dodatnie + Prawdziwie ujemne) / Całkowita liczba prognoz", wrong: ["TP / (TP + FP)", "TP / (TP + FN)", "(TP + FP) / N"]},
            {q: "Co oznacza termin 'macierz pomyłek'?", correct: "Liczba prawdziwie dodatnich, prawdziwie ujemnych, fałszywie pozytywnych i fałszywie negatywnych", wrong: ["Zbiór błędnych predykcji", "Funkcja kosztu", "Metryka regresji"]},
            {q: "Co mierzy precyzja?", correct: "TP / (TP + FP)", wrong: ["Stosunek TP do FN", "Stosunek TN do FP", "Stosunek wszystkich poprawnych wyników"]},
            {q: "Co reprezentuje wynik F1?", correct: "Średnia harmoniczna precyzji i przypominania", wrong: ["Średnią arytmetyczną dokładności", "Maksymalną precyzję", "Różnicę precyzji i recall"]},
            {q: "Jaki jest cel współczynnika uczenia?", correct: "Reguluje szybkość uczenia się modelu", wrong: ["Określa liczbę epok", "Zwiększa liczbę neuronów", "Normalizuje dane"]},
            {q: "Model dobrze radzi sobie na danych treningowych, ale słabo na nowych danych:", correct: "przeuczenie", wrong: ["niedouczenie", "generalizacja", "optymalizacja"]},
            {q: "Co oznacza termin 'epoka' w kontekście uczenia maszynowego?", correct: "Pojedyncze przejście przez cały zbiór danych treningowych", wrong: ["Jedną iterację algorytmu", "Przejście przez jedną warstwę", "Aktualizację wag"]},
            {q: "Do czego służy OpenCV?", correct: "Przetwarzanie obrazu i widzenie komputerowe", wrong: ["Analizy dźwięku", "Uczenia głębokiego", "Przetwarzania tekstu"]},
            {q: "Która funkcja służy do odczytu obrazu w OpenCV?", correct: "cv2.imread()", wrong: ["cv2.load()", "cv2.read()", "cv2.open()"]},
            {q: "Jak przekonwertować obraz kolorowy na skalę szarości w OpenCV?", correct: "cv2.cvtColor(image, cv2.COLOR_BGR2GRAY)", wrong: ["cv2.gray(image)", "cv2.toGray(image)", "cv2.convert(image)"]},
            {q: "Do czego służy cv2.VideoCapture(0)?", correct: "Uzyskuje dostęp do kamery internetowej", wrong: ["Nagrywa wideo do pliku", "Przetwarza obraz", "Otwiera plik wideo"]},
            {q: "Domyślnym formatem kolorów w OpenCV jest:", correct: "BGR", wrong: ["RGB", "HSV", "CMYK"]},
            {q: "Co oznacza HSV?", correct: "Hue, Saturation, Value", wrong: ["Hue, Saturation, Vector", "High, Standard, Value", "Heat, Saturation, Value"]},
            {q: "Jaka jest główna cecha uczenia się przez wzmacnianie?", correct: "Uczenie się poprzez nagrody i kary", wrong: ["Uczenie z danych oznaczonych", "Uczenie bez etykiet", "Minimalizacja funkcji kosztu"]},
            {q: "Co reprezentuje kanał odcienia (Hue)?", correct: "Rodzaj koloru", wrong: ["Jasność koloru", "Intensywność", "Nasycenie barwy"]},
            {q: "Która funkcja służy do nanoszenia tekstu na obraz w OpenCV?", correct: "cv2.putText()", wrong: ["cv2.drawText()", "cv2.text()", "cv2.writeText()"]},
            {q: "Która funkcja służy do rysowania linii w OpenCV?", correct: "cv2.line()", wrong: ["cv2.draw()", "cv2.stroke()", "cv2.path()"]}
        ];

        let currentQuestion = 0;
        let answers = {};
        let timeLeft = 30 * 60; // 30 minutes in seconds
        let timerInterval = null;
        let questions = [];

        // Shuffle array function
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Initialize questions with shuffled answers
        function initializeQuestions() {
            questions = questionsData.map((item, index) => {
                const allAnswers = [item.correct, ...item.wrong];
                const shuffled = shuffleArray(allAnswers);
                const correctIndex = shuffled.indexOf(item.correct);
                
                return {
                    number: index + 1,
                    question: item.q,
                    answers: shuffled,
                    correctIndex: correctIndex,
                    correctAnswer: item.correct,
                    image: item.image || null
                };
            });
        }

        // Render question
        function renderQuestion() {
            const question = questions[currentQuestion];
            const examContent = document.getElementById('exam-content');
            
            let html = `
                <div class="question active">
                    <div class="question-number">Pytanie ${question.number}/56</div>
                    <div class="question-text">${question.question}</div>
            `;
            
            if (question.image) {
                html += `<img src="${question.image}" alt="Question image" class="question-image">`;
            }
            
            html += `
                    <div class="options">
            `;
            
            const labels = ['A', 'B', 'C', 'D'];
            question.answers.forEach((answer, index) => {
                const isSelected = answers[currentQuestion] === index;
                html += `
                    <div class="option ${isSelected ? 'selected' : ''}" data-index="${index}">
                        <span class="option-label">${labels[index]}.</span>
                        <span>${answer}</span>
                    </div>
                `;
            });
            
            html += `
                    </div>
                    <div class="navigation">
                        <button class="btn btn-secondary" id="prev-btn" ${currentQuestion === 0 ? 'disabled' : ''}>Poprzednie</button>
                        <button class="btn btn-primary" id="next-btn" ${currentQuestion === questions.length - 1 ? 'style="display:none"' : ''}>Następne</button>
                        <button class="btn btn-success" id="submit-btn" ${currentQuestion !== questions.length - 1 ? 'style="display:none"' : ''}>Zakończ egzamin</button>
                    </div>
                </div>
            `;
            
            examContent.innerHTML = html;
            
            // Add event listeners
            document.querySelectorAll('.option').forEach(option => {
                option.addEventListener('click', () => {
                    const index = parseInt(option.dataset.index);
                    answers[currentQuestion] = index;
                    
                    // Auto-advance to next question
                    if (currentQuestion < questions.length - 1) {
                        currentQuestion++;
                        renderQuestion();
                    } else {
                        // Last question - just update the display
                        renderQuestion();
                    }
                });
            });
            
            document.getElementById('prev-btn').addEventListener('click', () => {
                if (currentQuestion > 0) {
                    currentQuestion--;
                    renderQuestion();
                    updateProgress();
                }
            });
            
            document.getElementById('next-btn').addEventListener('click', () => {
                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    renderQuestion();
                    updateProgress();
                }
            });
            
            document.getElementById('submit-btn').addEventListener('click', () => {
                if (confirm('Czy na pewno chcesz zakończyć egzamin?')) {
                    submitExam();
                }
            });
            
            updateProgress();
        }

        // Update progress
        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
            document.getElementById('current-q').textContent = currentQuestion + 1;
        }

        // Timer
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert('Czas minął! Egzamin zostanie automatycznie zakończony.');
                    submitExam();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                
                // Warning when 5 minutes left
                if (timeLeft === 5 * 60) {
                    alert('Uwaga! Zostało 5 minut!');
                }
            }, 1000);
        }

        // Submit exam
        function submitExam() {
            clearInterval(timerInterval);
            
            let correct = 0;
            questions.forEach((q, index) => {
                if (answers[index] === q.correctIndex) {
                    correct++;
                }
            });
            
            const percentage = Math.round((correct / questions.length) * 100);
            
            document.getElementById('exam-content').style.display = 'none';
            document.getElementById('results-screen').classList.add('active');
            document.getElementById('score-percentage').textContent = percentage + '%';
            document.getElementById('score-correct').textContent = correct;
            document.getElementById('score-total').textContent = questions.length;
        }

        // Initialize
        initializeQuestions();
        renderQuestion();
        startTimer();
    </script>
</body>
</html>
